INSET_ONE_PLATE=INSERT INTO t_plate(name, code, market) VALUES (#{name},#{code},#{market}) on conflict (code) do update set name=excluded.name,code=excluded.code,market=excluded.market where t_plate.name is distinct from excluded.name or t_plate.code is distinct from excluded.code or t_plate.market is distinct from excluded.market
INSET_ONE_SECURITY=INSERT INTO t_security(name, lot_size, sec_type, list_time, de_listing,exchange_type, identity, market, code) VALUES (#{name},#{lotSize},#{secType},#{listTime},#{deListing},#{exchangeType},#{identity},#{market},#{code})